services:
  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT:-5000}
      - NODE_ENV=${NODE_ENV:-production}

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

